name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Android App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, pdo_sqlite, mbstring, dom, xml, zip, curl

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install PHP Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies & Build Tailwind
        run: |
          npm install
          npm run build

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/DB_CONNECTION=.*/', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan migrate:fresh --seed --force

      - name: Force Skip iOS Build
        run: |
          cat << 'EOF' > skip_ios.php
          <?php
          $path = 'vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php';
          if (file_exists($path)) {
              $content = file_get_contents($path);
              $content = preg_replace('/(public\s+function\s+handle\s*\([^\)]*\)\s*(?::\s*[a-zA-Z0-9_\\\]+\s*)?\{)/', '$1 return 0;', $content);
              file_put_contents($path, $content);
              echo "iOS Build successfully bypassed!\n";
          }
          EOF
          php skip_ios.php

      - name: Build Android APK
        run: php artisan native:build

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: PAAU_SecureApp_APK
          path: "**/*.apk"
          retention-days: 7