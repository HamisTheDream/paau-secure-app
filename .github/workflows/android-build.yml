name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Android App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: sqlite3, pdo_sqlite, mbstring, dom, xml, zip, curl

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install PHP Dependencies & Fix Runtime
        run: |
          composer require nativephp/mobile
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies & Build Tailwind
        run: |
          npm install
          npm run build

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/DB_CONNECTION=.*/', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan migrate:fresh --seed --force

      - name: Generate Native Blueprints
        run: php artisan native:install --force --no-interaction || true

      - name: Surgical iOS Bypass
        run: |
          mkdir -p nativephp
          php -r "\$path = 'vendor/nativephp/mobile/src/Commands/BuildIosAppCommand.php'; if(file_exists(\$path)) { file_put_contents(\$path, str_replace('// Clear the last log', 'return 0;', file_get_contents(\$path))); }"

      - name: Scaffold Mobile Assets
        run: php artisan native:build

      - name: Inject Android Variables & App Name
        run: |
          php -r "
          \$gradle = 'nativephp/android/app/build.gradle.kts';
          if(file_exists(\$gradle)) {
              \$c = file_get_contents(\$gradle);
              \$c = str_replace('REPLACE_COMPILE_SDK', '35', \$c);
              \$c = str_replace('REPLACE_MIN_SDK', '24', \$c);
              \$c = str_replace('REPLACE_TARGET_SDK', '35', \$c);
              \$c = str_replace('REPLACEMECODE', '1', \$c);
              \$c = str_replace('REPLACE_MINIFY_ENABLED', 'false', \$c);
              \$c = str_replace('REPLACE_SHRINK_RESOURCES', 'false', \$c);
              \$c = str_replace('REPLACE_DEBUG_SYMBOLS', 'none', \$c);
              \$c = str_replace('REPLACE_APP_ID', 'ng.edu.paau.secureapp', \$c);
              file_put_contents(\$gradle, \$c);
          }
          
          \$manifest = 'nativephp/android/app/src/main/AndroidManifest.xml';
          if(file_exists(\$manifest)) {
              \$c = file_get_contents(\$manifest);
              \$c = str_replace('REPLACE_APP_ID', 'ng.edu.paau.secureapp', \$c);
              file_put_contents(\$manifest, \$c);
          }
          
          \$strings = 'nativephp/android/app/src/main/res/values/strings.xml';
          if(file_exists(\$strings)) {
              \$c = file_get_contents(\$strings);
              \$c = str_replace('>NativePHP<', '>PAAU SecureApp<', \$c);
              file_put_contents(\$strings, \$c);
          }
          "

      - name: Force Android Compilation
        run: |
          cd nativephp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Format and Rename APK File
        run: mv nativephp/android/app/build/outputs/apk/debug/app-debug.apk PAAU_SecureApp.apk

      - name: Upload Clean APK File
        uses: actions/upload-artifact@v4
        with:
          name: PAAU_SecureApp_APK
          path: PAAU_SecureApp.apk
          retention-days: 7